workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: | 
          flutter packages pub get
      - name: Build APK
        script: | 
          flutter build apk --release
    artifacts:
      - build//outputs//*.apk
    publishing:
      email:
        recipients:
          - nhow97d9@gmail.com
